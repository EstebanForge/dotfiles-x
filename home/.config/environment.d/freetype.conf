# Per-user session environment (read by systemd-environment-d-generator).
# No sudo required. Re-login to apply.
# See: https://wiki.archlinux.org/title/Font_configuration (Chromium/Electron blur)

# Re-enable stem darkening across all FreeType drivers. Workaround for blurry
# small text on dark backgrounds in Chromium/Electron apps (which disable gamma
# correction on X11/Wayland). Note: without gamma correction this can make text
# slightly heavier/fuzzier elsewhere per FreeType's docs; disable if it hurts.
FREETYPE_PROPERTIES=cff:no-stem-darkening=0 autofitter:no-stem-darkening=0 type1:no-stem-darkening=0 t1cid:no-stem-darkening=0

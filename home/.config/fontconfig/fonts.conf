<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
  Font rendering for non-GNOME apps (Firefox, Qt, etc.) that read fontconfig
  directly instead of GNOME's gsettings. Mirrors the gsettings choices in
  configure_rpm.sh / configure_deb.sh: hinting off, grayscale anti-aliasing.
  GNOME/GTK apps themselves read gsettings, not this file.
  See: https://wiki.archlinux.org/title/Font_configuration
-->
<fontconfig>

  <!-- Anti-aliasing on -->
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- Hinting off (macOS-like) -->
  <match target="font">
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- No subpixel layout: grayscale only (matches font-antialiasing=grayscale) -->
  <match target="font">
    <edit name="rgba" mode="assign">
      <const>none</const>
    </edit>
  </match>

</fontconfig>

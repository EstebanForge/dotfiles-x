# Per-user session environment (read by systemd-environment-d-generator, then
# inherited by gnome-session/GDM at login). No sudo required.
# See: environment.d(5), https://wiki.archlinux.org/title/GNOME/Tips_and_tricks
# Re-login (or restart the user systemd instance) to apply.

# GNOME Shell: animation slow-down factor. 0.0-1.0 speeds animations up,
# >1.0 slows them down. 0.5 = double-speed (no extension needed).
GNOME_SHELL_SLOWDOWN_FACTOR=0.5

# Electron apps: prefer the Wayland backend when available, fall back to X11.
# (Electron 38.2+ already defaults to Wayland; this backstops older builds.)
ELECTRON_OZONE_PLATFORM_HINT=auto
